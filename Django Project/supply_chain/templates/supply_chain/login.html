{% extends "supply_chain/base.html" %}

{% block title %}Login - Supply Chain Management{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-10 p-6 bg-white border-2 border-blue-900 rounded shadow">
    <h2 class="text-2xl font-bold mb-4 text-blue-900">Login</h2>
    <form method="post">
        {% csrf_token %}
        <div class="mb-4">
            <label for="username" class="block text-gray-700 text-sm font-bold mb-2">Username:</label>
            <input type="text" name="username" id="username" class="w-full border px-2 py-1 rounded">>
        </div>
        <div class="mb-4">
            <label for="password" class="block text-gray-700 text-sm font-bold mb-2">Password:</label>
            <input type="password" name="password" id="password" class="w-full border px-2 py-1 rounded">
        </div>
        <button type="submit" class="bg-blue-900 text-white px-4 py-2 rounded">Login</button>
    </form>
</div>
{% endblock %}
